<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ひだまりの本棚</title>

<style>
body {
    font-family: 'Times New Roman', "MS Mincho", serif;
    background-color: #f8f5e9;
    text-align: center;
    padding: 40px;
}

/* 本棚のコンテナ：Gridを使用して3列に固定 */
.bookshelf {
    display: grid;
    grid-template-columns: repeat(3, 1fr); 
    gap: 30px 20px; 
    max-width: 600px; 
    margin: 0 auto 40px; 
    align-items: end; 
    justify-items: center; 
}

/* 通常の背表紙 */
.spine {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 130px;
    height: 320px;
    background: linear-gradient(180deg, #4b2e1e 0%, #3a2416 100%);
    border-left: 10px solid #2a1a10;
    color: #d9c27e;
    writing-mode: vertical-rl;
    text-orientation: upright;
    font-size: 18px;
    border-radius: 6px;
    text-align: center;
    box-shadow: 3px 3px 8px rgba(0,0,0,0.4);
    letter-spacing: 1px;
    padding: 10px 0;
    box-sizing: border-box; 
}

/* 背表紙の中のリンク */
.spine a {
    color: #d9c27e;
    text-decoration: none;
    font-weight: bold;
    display: block;
    height: 100%;
    padding-top: 10px; /* 文字の開始位置を下げて余白を作る */
}

/* 背表紙のマーク（⚜） */
.spine::before {
    content: "⚜";
    display: block;
    font-size: 22px;
    margin-bottom: 25px; /* マークと文字の間隔 */
    writing-mode: horizontal-tb;
}

/* 特別な背表紙（細い本） */
.spine.special {
    width: 60px;
    height: 280px; 
    background: linear-gradient(180deg, #7a1a1a 0%, #5a1010 100%);
    border-left: 8px solid #3e0b0b;
    font-size: 15px;
}

.spine.special a {
    color: #f0e68c;
}

/* ホバー時の演出 */
.spine:hover {
    filter: brightness(1.2);
    transform: translateY(-5px);
    transition: 0.3s;
}
</style>
</head>

<body>

<h1>ひだまりの本棚</h1>

<div class="bookshelf">
  <div class="spine"><a href="book_pages/book1.html">時の鐘銀行</a></div>
  <div class="spine"><a href="book_pages/book2.html">鍵</a></div>
  <div class="spine"><a href="book_pages/book3.html">Autoinfanticide<br>世界の終焉と美しき獣</a></div>

  <div class="spine"><a href="bird.html">焦れ香</a></div>
  <div class="spine special"><a href="writing.html">玲はる名作品が読める場所</a></div>
</div>

<p><a href="index.html">← back to top</a></p>

</body>
</html>
