<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ひだまりの本棚</title>

<style>
body {
    font-family: 'Times New Roman', "MS Mincho", serif;
    background-color: #f8f5e9;
    text-align: center;
    padding: 40px;
}

/* 本棚のコンテナ：3列固定 */
.bookshelf {
    display: grid;
    grid-template-columns: repeat(3, 1fr); 
    gap: 30px 20px; 
    max-width: 600px; 
    margin: 0 auto 40px; 
    align-items: end; 
    justify-items: center; 
}

/* 背表紙のベース */
.spine {
    display: flex;
    flex-direction: column;   /* 縦方向に（マーク・文字の順で）並べる */
    align-items: center;      /* 左右中央に揃える */
    justify-content: flex-start; /* 上詰めで配置 */
    width: 130px;
    height: 320px;
    background: linear-gradient(180deg, #4b2e1e 0%, #3a2416 100%);
    border-left: 10px solid #2a1a10;
    color: #d9c27e;
    font-size: 18px;
    border-radius: 6px;
    box-shadow: 3px 3px 8px rgba(0,0,0,0.4);
    padding: 20px 5px;        /* 上下の余白 */
    box-sizing: border-box;
    transition: 0.3s;
}

/* 背表紙のマーク（⚜）の設定 */
.spine::before {
    content: "⚜";
    display: block;
    font-size: 24px;
    margin-bottom: 35px;      /* ★ここを大きくすると文字との間隔が空きます */
    line-height: 1;
    writing-mode: horizontal-tb; /* マークは横書きモードで正位置に */
}

/* タイトル部分の設定 */
.spine a {
    color: #d9c27e;
    text-decoration: none;
    font-weight: bold;
    writing-mode: vertical-rl;  /* 文字だけを縦書きにする */
    text-orientation: upright;
    letter-spacing: 0.1em;
    display: flex;
    align-items: center;
    height: auto;
}

/* 特別な背表紙（赤・細い本） */
.spine.special {
    width: 60px;
    height: 280px;
    background: linear-gradient(180deg, #7a1a1a 0%, #5a1010 100%);
    border-left: 8px solid #3e0b0b;
}

.spine.special a {
    color: #f0e68c;
    font-size: 15px;
}

/* ホバー演出 */
.spine:hover {
    filter: brightness(1.2);
    transform: translateY(-5px);
}
</style>
</head>

<body>

<h1>ひだまりの本棚</h1>

<div class="bookshelf">
  <div class="spine"><a href="book_pages/book1.html">時の鐘銀行</a></div>
  <div class="spine"><a href="book_pages/book2.html">鍵</a></div>
  <div class="spine"><a href="book_pages/book3.html">Autoinfanticide<br>世界の終焉と美しき獣</a></div>

  <div class="spine"><a href="bird.html">焦れ香</a></div>
  <div class="spine special"><a href="writing.html">玲はる名作品が読める場所</a></div>
</div>

<p><a href="index.html">← back to top</a></p>

</body>
</html>
