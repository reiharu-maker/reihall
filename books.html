<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ひだまりの本棚</title>

<style>
body {
    font-family: 'Times New Roman', "MS Mincho", serif;
    background-color: #f8f5e9;
    text-align: center;
    padding: 40px;
}

/* 本棚のコンテナ：3列固定 */
.bookshelf {
    display: grid;
    grid-template-columns: repeat(3, 1fr); 
    gap: 30px 20px; 
    max-width: 600px; 
    margin: 0 auto 40px; 
    align-items: end; /* 全ての本の下ラインを揃える */
    justify-items: center; 
}

/* 背表紙のベース */
.spine {
    display: block;
    writing-mode: vertical-rl; /* 縦書きモード */
    text-orientation: upright;
    text-align: center;
    color: #d9c27e;
    font-size: 18px;
    border-radius: 6px;
    box-shadow: 3px 3px 8px rgba(0,0,0,0.4);
    box-sizing: border-box;
    transition: 0.3s;
    
    /* 共通サイズ */
    width: 130px;
    height: 320px;
    background: linear-gradient(180deg, #4b2e1e 0%, #3a2416 100%);
    border-left: 10px solid #2a1a10;
    
    /* 内部の余白調整 */
    padding: 0 10px; 
}

/* 背表紙内のリンクテキスト */
.spine a {
    color: inherit;
    text-decoration: none;
    font-weight: bold;
    display: inline-block;
    vertical-align: middle; /* マークと高さを合わせる */
    line-height: 1.2;
    letter-spacing: 0.05em;
}

/* 背表紙のマーク（⚜） */
.spine::before {
    content: "⚜";
    display: inline-block; 
    font-size: 24px;
    vertical-align: middle; /* 文字と高さを合わせる */
    
    /* ★ 記号と文字の「横の隙間」をここで調整します */
    margin-left: 15px; 
    margin-top: 0;
    margin-bottom: 0;
}

/* 特別な背表紙（赤・細い本） */
.spine.special {
    width: 60px;
    height: 280px;
    background: linear-gradient(180deg, #7a1a1a 0%, #5a1010 100%);
    border-left: 8px solid #3e0b0b;
}

.spine.special a {
    color: #f0e68c;
    font-size: 15px;
}

/* ホバー演出 */
.spine:hover {
    filter: brightness(1.2);
    transform: translateY(-5px);
}
</style>
</head>

<body>

<h1>ひだまりの本棚</h1>

<div class="bookshelf">
  <div class="spine"><a href="book_pages/book1.html">時の鐘銀行</a></div>
  <div class="spine"><a href="book_pages/book2.html">鍵</a></div>
  <div class="spine"><a href="book_pages/book3.html">Autoinfanticide<br>世界の終焉と美しき獣</a></div>

  <div class="spine"><a href="bird.html">焦れ香</a></div>
  <div class="spine special"><a href="writing.html">玲はる名作品が読める場所</a></div>
</div>

<p><a href="index.html">← back to top</a></p>

</body>
</html>
