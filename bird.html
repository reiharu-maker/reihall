<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>bird</title>

<style>
  body {
    margin: 0;
    background: linear-gradient(to top, #1a2235 0%, #2f2f6e 50%, #e0e6f8 100%);
    color: #ffffff;
    font-family: "游明朝", serif;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* ← ここが抜けていた（鳥のアニメーション） */
  .sky {
    position: absolute;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  .bird {
    position: absolute;
    width: 40px;
    height: 40px;
    background: url('https://upload.wikimedia.org/wikipedia/commons/7/7c/Black_bird_silhouette.png') no-repeat center;
    background-size: contain;
    animation: fly 15s linear infinite;
    opacity: 0.2;
  }

  @keyframes fly {
    0% { transform: translateX(-10%) translateY(10vh); }
    100% { transform: translateX(110%) translateY(50vh); }
  }
  /* ↑ ここまでが抜けていた */

  .poem {
    position: absolute;
    bottom: 5vh;
    left: 6vw;
    font-size: 1.4rem;
    background: rgba(0, 0, 0, 0.22);
    padding: 1rem;
    border-left: 4px solid #aaa;
  }

  .text-block {
    position: absolute;
    top: 45vh;
    left: 5vw;
    right: 5vw;
    height: 48vh;
    overflow-y: scroll;
    background: rgba(0,0,0,0.15);
    padding: 1.5rem;
    line-height: 1.8;
    font-size: 1rem;
    white-space: pre-wrap;
    backdrop-filter: blur(2px);
  }

  .text-block::-webkit-scrollbar {
    width: 6px;
  }
  .text-block::-webkit-scrollbar-track {
    background: rgba(0,0,0,0.1);
  }
  .text-block::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.25);
    border-radius: 3px;
  }

  footer {
    position: absolute;
    bottom: 1vh;
    right: 2vw;
    font-size: 0.8rem;
    opacity: 0.7;
  }
</style>

</head>

<body>

<div class="sky">
  <div class="bird" style="top: 20%; animation-delay: 0s;"></div>
  <div class="bird" style="top: 30%; animation-delay: 2s;"></div>
  <div class="bird" style="top: 40%; animation-delay: 4s;"></div>
  <div class="bird" style="top: 60%; animation-delay: 6s;"></div>
  <div class="bird" style="top: 50%; animation-delay: 8s;"></div>
</div>

<div class="poem">
  西へ向かい明けゆく空に<br>
  飛ぶ鳥の数多が人であるなら<br>
  怖い　　　　　　玲はる名
</div>

<div class="text-block">
（本文そのまま）
</div>

<footer>
  © ReiHall / 玲はる名
</footer>

</body>
</html>
